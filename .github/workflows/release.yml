# ========
# Fluxo definitivo para publicação OIDC (Trusted Publishing).
# A remoção do parâmetro registry-url no setup-node é estritamente necessária.
# Isso impede a criação de um arquivo de configuração de token vazio e força
# o NPM a utilizar nativamente o OIDC tanto para a assinatura de proveniência
# quanto para a autenticação direta no registro, eliminando falsos erros 404.
# ========
name: Release and Publish

on:
  push:
    branches:
      - main
      - beta

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Update NPM
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Execute Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx release-it --ci