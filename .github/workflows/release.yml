# ========
# Este arquivo configura o fluxo de automação usando o Release-It.
# Restauramos a criação nativa do .npmrc pelo setup-node e injetamos uma variável 
# de ambiente para satisfazer a segurança local do NPM, forçando-o a habilitar 
# e prosseguir com a publicação OIDC via Trusted Publishing.
# ========
name: Release and Publish

on:
  push:
    branches:
      - main
      - beta

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      # Permissão necessária para o login automático do NPM (OIDC)
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          # Obrigatório para gerar o arquivo .npmrc e habilitar o OIDC
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Execute Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Variável estrutural. Mesmo que o segredo NPM_TOKEN não exista no seu repositório,
          # o GitHub passa um valor vazio que preenche o .npmrc e libera a execução do OIDC.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx release-it --ci